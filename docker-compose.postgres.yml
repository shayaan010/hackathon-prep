services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hackathon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon
    volumes:
      - pgdata_hackathon:/var/lib/postgresql/data
      - ./store/schema_postgres.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata_hackathon:
