services:
  db:
    image: pgvector/pgvector:pg16
    container_name: new-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: new_api
    ports:
      - "5433:5432"
    volumes:
      - new_api_pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d new_api"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: new-api-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@db:5432/new_api
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8001:8000"
    restart: unless-stopped

volumes:
  new_api_pgdata:
